# us211 Standard State Pack — TEMPLATE
# Purpose: a structured "arrival and establishment" guide for anyone moving to,
#   returning to, or starting over in this state. Works with or without money,
#   with or without an address, with or without documents.
#
# Rules for contributors:
#   - Every entry must link to an official, verified, public source.
#   - Never fabricate a phone number, address, or program name.
#   - If a section is not yet researched, leave it empty ([]) — do not guess.
#   - Keep language plain and welcoming. This may be read by someone in crisis.
#   - For "how to apply" entries, include the exact URL and any required docs.

